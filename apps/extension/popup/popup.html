<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AliSum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #27272a;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: #a1a1aa;
    }
    .status-row .value {
      color: #fafafa;
      font-weight: 500;
    }
    .connected { color: #22c55e; }
    .disconnected { color: #ef4444; }
    .syncing { color: #eab308; }
    .progress-text {
      font-size: 12px;
      color: #eab308;
      text-align: center;
      margin-top: 4px;
    }
    .actions {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: #fafafa;
      color: #0a0a0a;
    }
    .btn-secondary {
      background: transparent;
      color: #fafafa;
      border: 1px solid #27272a;
    }
    .btn-link {
      background: transparent;
      color: #a1a1aa;
      font-size: 12px;
      padding: 6px;
    }
    .error {
      font-size: 12px;
      color: #ef4444;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ali-sum</h1>
  </div>

  <div id="connect-prompt" style="display:none;">
    <p style="font-size: 13px; color: #a1a1aa; text-align: center; margin-bottom: 12px;">
      Connect your account to start syncing orders.
    </p>
    <button class="btn-primary" id="btn-connect">Connect Account</button>
  </div>

  <div id="main-view">
    <div class="status-row">
      <span>Status</span>
      <span class="value" id="status-text">—</span>
    </div>
    <div class="status-row">
      <span>Last sync</span>
      <span class="value" id="last-sync">Never</span>
    </div>
    <div class="status-row">
      <span>Orders synced</span>
      <span class="value" id="order-count">0</span>
    </div>

    <div id="progress-container" style="display:none;">
      <p class="progress-text" id="progress-text"></p>
    </div>

    <div id="error-container" style="display:none;">
      <p class="error" id="error-text"></p>
    </div>

    <div class="actions">
      <button class="btn-primary" id="btn-sync">Sync Now</button>
      <button class="btn-secondary" id="btn-dashboard">Open Dashboard</button>
    </div>
  </div>

  <script src="../dist/popup.js" type="module"></script>
</body>
</html>
